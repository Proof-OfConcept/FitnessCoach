<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            padding: 20px;
        }

        /* This container keeps the top boxes in one row */
        .top-row {
            display: flex;
            gap: 20px; /* Space between the separate boxes */
            align-items: flex-start;
        }

        /* Updated Rank Box (Larger) */
        .rank-box {
            padding: 20px 40px; /* Increased size like you asked */
            border: 1.5px solid #404040;
            border-radius: 10px;
            background-color: #1a1a1a;
            font-weight: bold;
        }

        /* Box 2: The Navigation Box */
        .nav-box {
            padding: 20px 100px;
            border: 1.5px solid #404040;
            border-radius: 10px;
            background-color: #1a1a1a;
            display: flex;
            gap: 40px; /* Space between Home, Food, etc. */
        }

        .nav-item {
            color: #aaa; /* Slightly faded so it looks like a menu */
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* This highlights the "Active" page (Home) */
        .active {
            color: #4a90e2; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-row">
        <div class="rank-box">
            Rank: Chunky
        </div>

        <div class="nav-box">
            <span class="nav-item active">Home</span>
            <span class="nav-item">Food</span>
            <span class="nav-item">Fitness</span>
            <span class="nav-item">AI</span>
        </div>
    </div>

</body>
</html>
